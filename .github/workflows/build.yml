name: Build deployctl

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label used in artifact names"
        required: false
        default: "dev"
      upload_artifacts:
        description: "Upload build artifacts"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Prepare dependencies
        run: |
          go mod tidy
          go mod download

      - name: Format source
        run: gofmt -w .

      - name: Run tests
        run: go test -vet=off ./...

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          binary="deployctl-${{ github.event.inputs.version }}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "dist/${binary}" .

      - name: Package artifact
        run: |
          cd dist
          artifact="deployctl-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${artifact}.zip" "${artifact}.exe"
          else
            tar -czf "${artifact}.tar.gz" "${artifact}"
          fi

      - name: Upload artifact
        if: ${{ github.event.inputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: deployctl-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error
