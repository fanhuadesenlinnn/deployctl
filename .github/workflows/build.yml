name: Build deployctl

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version / tag name, for example v0.1.0"
        required: true
        default: "v0.1.0"
      upload_artifacts:
        description: "Upload workflow artifacts"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      publish_release:
        description: "Publish packages to GitHub Releases"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Prepare dependencies
        run: |
          go mod tidy
          go mod download

      - name: Format source
        run: gofmt -w ./cmd/deployctl-safe

      - name: Run tests
        run: go test -vet=off ./cmd/deployctl-safe

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          binary="deployctl-${{ github.event.inputs.version }}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "dist/${binary}" ./cmd/deployctl-safe

      - name: Package artifact
        run: |
          cd dist
          artifact="deployctl-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${artifact}.zip" "${artifact}.exe"
            sha256sum "${artifact}.zip" > "${artifact}.zip.sha256"
          else
            tar -czf "${artifact}.tar.gz" "${artifact}"
            sha256sum "${artifact}.tar.gz" > "${artifact}.tar.gz.sha256"
          fi

      - name: Upload workflow artifact
        if: ${{ github.event.inputs.upload_artifacts == 'true' || github.event.inputs.publish_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: deployctl-${{ github.event.inputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.zip.sha256
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.publish_release == 'true' }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Show release files
        run: ls -lah dist-release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: deployctl ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist-release/*.zip
            dist-release/*.zip.sha256
            dist-release/*.tar.gz
            dist-release/*.tar.gz.sha256
